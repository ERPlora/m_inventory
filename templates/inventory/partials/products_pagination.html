<div class="flex flex-col md:flex-row justify-between items-stretch md:items-center gap-3">
    <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
        <div class="flex items-center gap-2">
            <span class="text-sm" style="color: var(--ion-color-medium);">{{ _("Show") }}:</span>
            <select
                name="per_page"
                class="h-9 px-3 rounded-lg text-sm"
                style="border: 1px solid var(--ion-border-color); background: var(--ion-background-color); color: var(--ion-text-color);"
                hx-get="{{ request.url.path }}"
                hx-target="#products-table-container"
                hx-include="[name='search'],[name='order_by']"
                hx-push-url="true">
                <option value="10" {% if per_page == 10 %}selected{% endif %}>10</option>
                <option value="25" {% if per_page == 25 or not per_page %}selected{% endif %}>25</option>
                <option value="50" {% if per_page == 50 %}selected{% endif %}>50</option>
            </select>
        </div>

        {% if total_count > 0 %}
        <div class="text-sm" style="color: var(--ion-color-medium);">
            {{ _("Showing") }} {{ start_index }}&ndash;{{ end_index }} {{ _("of") }} {{ total_count }}
        </div>
        {% endif %}
    </div>
</div>
